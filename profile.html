<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile | IZIPAY</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f1115;      
            --card-bg: #ffffff;      
            --primary-green: #638576; 
            --primary-hover: #4e6b5e;
            --text-dark: #1a1a1a;
            --text-gray: #8e8e93;
            --border-light: #e5e7eb;
            --toggle-bg: #f3f4f6;
            --error-red: #ef4444;
            --success-green: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Лоадер при загрузке данных */
        #loader { position: fixed; inset: 0; background: var(--bg-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .loader-ring { display: inline-block; position: relative; width: 50px; height: 50px; margin-bottom: 10px; }
        .loader-ring div { box-sizing: border-box; display: block; position: absolute; width: 40px; height: 40px; margin: 4px; border: 4px solid var(--primary-green); border-radius: 50%; animation: loader-ring 1.2s infinite; border-color: var(--primary-green) transparent transparent transparent; }
        @keyframes loader-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ===== HEADER ===== */
        .header {
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .back-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            color: white;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: 0.2s;
            font-size: 20px;
            cursor: pointer;
        }
        .back-btn:active { transform: scale(0.95); }

        .header-title { font-size: 20px; font-weight: 600; }

        .logout-btn {
            color: #ef4444; font-size: 24px; text-decoration: none;
            transition: 0.2s; display: flex; align-items: center; cursor: pointer;
        }
        .logout-btn:active { transform: scale(0.90); }

        /* ===== CONTENT SHEET ===== */
        .content-sheet {
            background: var(--card-bg);
            flex-grow: 1;
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            padding: 32px 24px;
            color: var(--text-dark);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
        }

        .section-title {
            font-size: 18px; font-weight: 600; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-icon { color: var(--primary-green); font-size: 20px; }

        .form-group { margin-bottom: 20px; }

        .input-label {
            font-size: 13px; font-weight: 500; color: var(--text-gray);
            margin-bottom: 8px; display: block;
        }

        .custom-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-dark);
            background: var(--toggle-bg);
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            outline: none;
        }
        .custom-input:focus {
            border-color: var(--primary-green);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 133, 118, 0.1);
        }

        .btn-primary {
            width: 100%; padding: 14px;
            background: var(--primary-green); color: white;
            border: none; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: 0.2s; margin-top: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.7; pointer-events: none; }

        .avatar-section { text-align: center; margin-bottom: 30px; }
        .avatar-circle {
            width: 80px; height: 80px; background: var(--toggle-bg);
            border-radius: 50%; margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: var(--primary-green); font-weight: 700;
        }
        .user-email-display { font-size: 14px; color: var(--text-gray); }

        @media (min-width: 768px) {
            .content-sheet { border-radius: 32px; margin: 20px auto; min-height: auto; padding: 40px; }
            .profile-grid { grid-template-columns: 1fr 1fr; gap: 60px; position: relative; }
            .profile-grid::after {
                content: ''; position: absolute; top: 0; bottom: 0; left: 50%;
                width: 1px; background: var(--border-light); display: block;
            }
        }
        
        @media (max-width: 767px) {
            .section-2 { margin-top: 40px; padding-top: 40px; border-top: 1px solid var(--border-light); }
        }

        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-ring"><div></div><div></div><div></div><div></div></div>
        <div style="color: var(--primary-green); font-weight: 600; letter-spacing: 2px;">Loading...</div>
    </div>

    <div class="header">
        <a href="settings.html" class="back-btn" onclick="triggerHaptic()"><i class="ri-arrow-left-line"></i></a>
        <div class="header-title">Profile</div>
        <a onclick="logoutTg()" class="logout-btn" title="Unlink Account"><i class="ri-logout-box-r-line"></i></a>
    </div>

    <div class="content-sheet">
        
        <div class="avatar-section">
            <div class="avatar-circle" id="avatarLetter">U</div>
            <div class="user-email-display" id="userEmailDisplay">loading...</div>
        </div>

        <div class="profile-grid">
            
            <div class="section-1">
                <div class="section-title">
                    <i class="ri-user-settings-line section-icon"></i>
                    Personal Information
                </div>

                <form id="profileForm">
                    <div class="form-group">
                        <label class="input-label">Full Name</label>
                        <input type="text" id="full_name" class="custom-input" placeholder="Your Name">
                    </div>

                    <div class="form-group">
                        <label class="input-label">Phone Number</label>
                        <input type="tel" id="phone" class="custom-input" placeholder="+1 234 567 890">
                    </div>

                    <div class="form-group">
                        <label class="input-label">Saved Wallet Address</label>
                        <input type="text" id="wallet_address" class="custom-input" placeholder="Your crypto wallet">
                    </div>

                    <button type="submit" class="btn-primary" id="profileSubmit">Save Changes</button>
                </form>
            </div>

            <div class="section-2">
                <div class="section-title">
                    <i class="ri-lock-password-line section-icon"></i>
                    Change Password
                </div>

                <form id="passwordForm">
                    <div class="form-group">
                        <label class="input-label">Current Password</label>
                        <input type="password" id="current_password" class="custom-input" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label class="input-label">New Password</label>
                        <input type="password" id="new_password" class="custom-input" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label class="input-label">Confirm New Password</label>
                        <input type="password" id="confirm_new_password" class="custom-input" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-primary" id="passwordSubmit">Update Password</button>
                </form>
            </div>

        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id || "7897252945"; // Замените на реальный при запуске в ТГ

        function triggerHaptic() {
            tg.HapticFeedback.impactOccurred('light');
        }

        function logoutTg() {
            tg.HapticFeedback.impactOccurred('medium');
            tg.showConfirm("Are you sure you want to unlink your Telegram account from this profile?", function(confirmed) {
                if(confirmed) {
                    // Здесь можно сделать запрос к API для отвязки
                    // window.location.href = 'login_tg.html';
                    tg.showAlert("Account unlinked.");
                    tg.close();
                }
            });
        }

        // 1. Загрузка данных профиля
        async function loadProfile() {
            try {
                // Замените URL на ваш актуальный эндпоинт API
                const response = await fetch(`https://izipay.me/api/get_profile_tg.php?tg_id=${userId}`);
                const data = await response.json();
                
                document.getElementById('loader').style.display = 'none';

                if (data.status === 'success') {
                    document.getElementById('full_name').value = data.full_name || '';
                    document.getElementById('phone').value = data.phone || '';
                    document.getElementById('wallet_address').value = data.wallet_address || '';
                    
                    const email = data.email || 'user@izipay.me';
                    document.getElementById('userEmailDisplay').innerText = email;
                    document.getElementById('avatarLetter').innerText = email.charAt(0).toUpperCase();
                } else {
                    tg.showAlert("Failed to load profile.");
                }
            } catch (err) {
                document.getElementById('loader').style.display = 'none';
                console.error("Load error", err);
            }
        }

        // 2. Обновление личных данных
        document.getElementById('profileForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('profileSubmit');
            const originalText = btn.innerText;
            
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div>';
            tg.HapticFeedback.impactOccurred('medium');

            const payload = {
                tg_id: userId,
                full_name: document.getElementById('full_name').value,
                phone: document.getElementById('phone').value,
                wallet_address: document.getElementById('wallet_address').value
            };

            try {
                const response = await fetch('https://izipay.me/api/update_profile_tg.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                btn.disabled = false;
                btn.innerText = originalText;

                if (result.status === 'success') {
                    tg.showAlert("Profile updated successfully!");
                } else {
                    tg.showAlert("Error: " + result.message);
                }
            } catch (err) {
                btn.disabled = false;
                btn.innerText = originalText;
                tg.showAlert("Connection error.");
            }
        };

        // 3. Обновление пароля
        document.getElementById('passwordForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('passwordSubmit');
            const originalText = btn.innerText;

            const currentPassword = document.getElementById('current_password').value;
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_new_password').value;

            if (newPassword !== confirmPassword) {
                tg.showAlert("New passwords do not match!");
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div>';
            tg.HapticFeedback.impactOccurred('medium');

            const payload = {
                tg_id: userId,
                current_password: currentPassword,
                new_password: newPassword
            };

            try {
                const response = await fetch('https://izipay.me/api/change_password_tg.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                btn.disabled = false;
                btn.innerText = originalText;

                if (result.status === 'success') {
                    tg.showAlert("Password changed successfully!");
                    document.getElementById('passwordForm').reset();
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    tg.showAlert("Error: " + result.message);
                    tg.HapticFeedback.notificationOccurred('error');
                }
            } catch (err) {
                btn.disabled = false;
                btn.innerText = originalText;
                tg.showAlert("Connection error.");
            }
        };

        // Запускаем загрузку профиля при старте
        loadProfile();
    </script>
</body>
</html>
