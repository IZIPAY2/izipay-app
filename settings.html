<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings | IZIPAY</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --accent: #d4b56f;
            --text-secondary: #8e8e93;
            --btn-gray: #1c1c1e;
            --dark-block: #0d0d0d;
            --container-width: 1400px;
            --app-max-width: 430px;
        }

        /* Полное скрытие стандартного кружка чата Tawk.to */
        #tawkchat-container, .tawk-min-container, .tawk-badge {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: var(--container-width);
            padding: 16px;
            display: flex;
            flex-direction: column;
            padding-bottom: 100px; /* Отступ для таб-бара */
        }

        /* ШАПКА */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 4px 0 4px;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .icon-circle-btn {
            background: var(--btn-gray);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.2s;
        }
        .icon-circle-btn:active {
            transform: scale(0.95);
        }

        /* ОСНОВНОЙ ПЛАН СЕТКИ */
        .settings-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .settings-item {
            background: var(--dark-block);
            border: 1px solid #1c1c1e;
            border-radius: 28px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: white;
            transition: transform 0.1s, background 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .settings-item:active {
            transform: scale(0.98);
            background: #161618;
        }

        .settings-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .settings-icon {
            width: 44px;
            height: 44px;
            background: var(--btn-gray);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .settings-text h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .settings-text p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .chevron {
            color: #333;
        }

        /* ДЕСКТОПНАЯ МОДИФИКАЦИЯ */
        @media (min-width: 1024px) {
            .app-container { padding: 40px; }
            .settings-layout { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .settings-item { padding: 28px; }
            .settings-item:hover { border-color: var(--accent); background: #0a0a0a; }
            .page-title { font-size: 40px; }
        }

        /* ТАБ БАР */
        .nav-bar {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            max-width: calc(100% - 32px);
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 8px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 10px;
            text-decoration: none;
            padding: 8px 0;
            border-radius: 30px;
            transition: all 0.2s ease;
            overflow: visible;
        }

        .nav-item svg {
            flex-shrink: 0;
            margin-bottom: 2px;
            display: block;
            overflow: visible;
        }

        .nav-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="top-nav">
            <h1 class="page-title">Settings</h1>
            <a href="profile.html" class="icon-circle-btn" onclick="triggerHaptic()">
                <i class="ri-user-3-line" style="font-size: 20px;"></i>
            </a>
        </header>

        <div class="settings-layout">
            
            <div class="settings-item" onclick="openSupport()">
                <div class="settings-info">
                    <div class="settings-icon">
                        <i class="ri-customer-service-2-line" style="font-size: 24px;"></i>
                    </div>
                    <div class="settings-text">
                        <h4>Live Support</h4>
                        <p>Chat with our team 24/7</p>
                    </div>
                </div>
                <div class="chevron">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
            </div>

            <a href="https://t.me/izipaycardbot" class="settings-item" onclick="triggerHaptic()">
                <div class="settings-info">
                    <div class="settings-icon">
                        <i class="ri-telegram-fill" style="font-size: 24px;"></i>
                    </div>
                    <div class="settings-text">
                        <h4>Telegram Bot</h4>
                        <p>Manage cards via Telegram</p>
                    </div>
                </div>
                <div class="chevron">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
            </a>

            <a href="security.html" class="settings-item" onclick="triggerHaptic()">
                <div class="settings-info">
                    <div class="settings-icon">
                        <i class="ri-shield-keyhole-line" style="font-size: 24px;"></i>
                    </div>
                    <div class="settings-text">
                        <h4>Security 2FA</h4>
                        <p>Two-factor authentication</p>
                    </div>
                </div>
                <div class="chevron">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
            </a>

            <a href="password.html" class="settings-item" onclick="triggerHaptic()">
                <div class="settings-info">
                    <div class="settings-icon">
                        <i class="ri-lock-password-line" style="font-size: 24px;"></i>
                    </div>
                    <div class="settings-text">
                        <h4>Change Password</h4>
                        <p>Update your account credentials</p>
                    </div>
                </div>
                <div class="chevron">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
            </a>

        </div>

        <nav class="nav-bar">
            <a href="index.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
                <span>Cards</span>
            </a>
            <a href="transactions.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V8H6a2 2 0 01-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><rect x="14" y="11" width="8" height="6" rx="2"/></svg>
                <span>Transactions</span>
            </a>
            <a href="settings.html" class="nav-item active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                <span>Settings</span>
            </a>
        </nav>
    </div>

    <script type="text/javascript">
        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
        
        // Скрываем виджет при загрузке (чтобы кружок не висел поверх интерфейса ТГ)
        Tawk_API.onLoad = function(){
            Tawk_API.hideWidget();
        };

        // Прячем обратно после закрытия диалога
        Tawk_API.onWidgetMinimize = function(){
            Tawk_API.hideWidget();
        };

        (function(){
            var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
            s1.async=true;
            s1.src='https://embed.tawk.to/690a2e8719218b194c66a8c2/1j97sbh8d';
            s1.charset='UTF-8';
            s1.setAttribute('crossorigin','*');
            s0.parentNode.insertBefore(s1,s0);
        })();
    </script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function triggerHaptic() {
            tg.HapticFeedback.impactOccurred('light');
        }

        function openSupport() {
            triggerHaptic();
            if (typeof Tawk_API !== 'undefined') {
                Tawk_API.showWidget();
                Tawk_API.maximize();
            }
        }
    </script>
</body>
</html>
