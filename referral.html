<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Referral Program | IZIPAY</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --accent: #d4b56f;
            --text-secondary: #8e8e93;
            --btn-gray: #1c1c1e;
            --dark-block: #0d0d0d;
            --container-width: 1400px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: var(--container-width);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 100px;
        }

        /* ШАПКА */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 4px 0 4px;
            margin-bottom: 10px;
        }

        .back-btn {
            background: var(--btn-gray);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            border: 1px solid #333;
            transition: 0.2s;
        }
        .back-btn:active { transform: scale(0.95); }

        .page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }

        /* СЕТКА */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* --- ЛЕВАЯ СТОРОНА (ИНВАЙТ) --- */
        .left-side { display: flex; flex-direction: column; gap: 15px; }

        .invite-card {
            background: linear-gradient(145deg, #1e1e1e 0%, #0a0a0a 100%);
            border: 1px solid #2a2a2a;
            border-radius: 32px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .invite-card h3 { color: var(--accent); font-size: 22px; margin-bottom: 10px; }
        .invite-card p { color: var(--text-secondary); font-size: 14px; line-height: 1.5; margin-bottom: 25px; }

        .link-box {
            background: rgba(0,0,0,0.4);
            border: 1px dashed #444;
            border-radius: 16px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .link-box:active { border-color: var(--accent); background: rgba(212, 181, 111, 0.05); }
        .link-box span { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 10px; }

        .share-btn {
            background: var(--accent);
            color: black;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .share-btn:active { transform: scale(0.98); }

        .stats-block {
            background: var(--dark-block);
            border: 1px solid #1c1c1e;
            border-radius: 28px;
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-item { text-align: center; }
        .stat-val { display: block; font-size: 20px; font-weight: 700; color: white; margin-bottom: 4px; }
        .stat-val.gold { color: var(--accent); }
        .stat-lab { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

        /* --- ПРАВАЯ СТОРОНА (СПИСОК) --- */
        .right-side { display: flex; flex-direction: column; gap: 15px; }

        .referrals-list {
            background: var(--dark-block);
            border: 1px solid #1c1c1e;
            border-radius: 28px;
            overflow: hidden;
            min-height: 200px;
        }

        .list-header { padding: 20px 24px; border-bottom: 1px solid #1c1c1e; font-weight: 600; }

        .referral-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            border-bottom: 1px solid #1c1c1e;
        }
        .referral-row:last-child { border-bottom: none; }

        .r-info h5 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .r-info span { font-size: 11px; color: var(--text-secondary); }

        .status-tag { font-size: 13px; font-weight: 700; }
        .status-tag.pending { color: var(--text-secondary); }
        .status-tag.completed { color: #10b981; }

        /* ДЕСКТОП */
        @media (min-width: 1024px) {
            .app-container { padding: 40px; gap: 30px; }
            .main-layout { grid-template-columns: 500px 1fr; gap: 30px; align-items: start; }
            .invite-card { padding: 40px; }
            .stats-block { padding: 30px; }
            .stat-val { font-size: 24px; }
            .referrals-list { min-height: 400px; }
        }

        /* ТАБ БАР */
        .nav-bar {
            position: fixed;
            bottom: 12px; left: 50%; transform: translateX(-50%);
            width: 400px; max-width: calc(100% - 32px);
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px; padding: 8px;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; border: 1px solid rgba(255,255,255,0.05);
        }

        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 4px; color: var(--text-secondary); font-size: 10px; text-decoration: none;
            padding: 8px 0; border-radius: 30px; overflow: visible;
        }

        .nav-item svg { flex-shrink: 0; margin-bottom: 2px; display: block; overflow: visible; }
        .nav-item.active { background: rgba(255,255,255,0.1); color: white; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: white; color: black; padding: 12px 24px; border-radius: 50px;
            font-size: 14px; font-weight: 600; opacity: 0; transition: 0.3s; z-index: 3000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .empty-state { padding: 60px 20px; text-align: center; color: var(--text-secondary); }
        .empty-state i { font-size: 48px; opacity: 0.2; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>
    <div id="toast" class="toast">Link copied!</div>

    <div class="app-container">
        <header class="top-nav">
            <a href="index.html" class="back-btn" onclick="triggerHaptic()"><i class="ri-arrow-left-s-line"></i></a>
            <h1 class="page-title">Referral</h1>
            <div style="width: 42px;"></div>
        </header>

        <div class="main-layout">
            <div class="left-side">
                <div class="invite-card">
                    <h3>Invite & Earn</h3>
                    <p>Earn $10 for every friend who issues their card. Your friends get a premium card, you get rewards.</p>
                    
                    <div class="link-box" onclick="copyInviteLink()">
                        <span id="refLinkText">Loading...</span>
                        <i class="ri-file-copy-line" style="color: var(--accent);"></i>
                    </div>

                    <button class="share-btn" onclick="shareLink()">
                        <i class="ri-share-forward-fill"></i> Share My Link
                    </button>
                </div>

                <div class="stats-block">
                    <div class="stat-item">
                        <span class="stat-val" id="totalFriends">0</span>
                        <span class="stat-lab">Friends</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-val gold" id="pendingBonus">$0</span>
                        <span class="stat-lab">Pending</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-val" style="color: #10b981;" id="earnedBonus">$0</span>
                        <span class="stat-lab">Earned</span>
                    </div>
                </div>
            </div>

            <div class="right-side">
                <div class="referrals-list">
                    <div class="list-header">Your Referrals</div>
                    <div id="referralsListContainer">
                        <div class="empty-state">
                            <i class="ri-loader-4-line ri-spin"></i>
                            <p>Loading referrals...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <a href="index.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
                <span>Cards</span>
            </a>
            <a href="transactions.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V8H6a2 2 0 01-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><rect x="14" y="11" width="8" height="6" rx="2"/></svg>
                <span>Transactions</span>
            </a>
            <a href="settings.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                <span>Settings</span>
            </a>
        </nav>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id || "7897252945";
        
        // Формируем ссылку. Если у вас в боте есть команда /start ref_id, 
        // можно использовать ссылку на бота: `https://t.me/izipaycardbot?start=${userId}`
        // Но чтобы сохранить логику сайта, оставляем:
        const referralLink = `https://izipay.me/register.php?ref=${userId}`;
        
        document.getElementById('refLinkText').innerText = referralLink;

        function triggerHaptic() {
            tg.HapticFeedback.impactOccurred('light');
        }

        function copyInviteLink() {
            const el = document.createElement('textarea');
            el.value = referralLink;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
            
            tg.HapticFeedback.notificationOccurred('success');
        }

        function shareLink() {
            triggerHaptic();
            const shareText = "Get your premium crypto card at IZIPAY!";
            // Используем нативный метод Telegram для шеринга
            const tgShareUrl = `https://t.me/share/url?url=${encodeURIComponent(referralLink)}&text=${encodeURIComponent(shareText)}`;
            tg.openTelegramLink(tgShareUrl);
        }

        // Загрузка данных о рефералах (пример запроса к API)
        async function loadReferrals() {
            try {
                // Предполагаемый эндпоинт, который вернет данные о рефералах
                const response = await fetch(`https://izipay.me/api/get_referrals_tg.php?tg_id=${userId}`);
                
                // Если API существует и отвечает
                if (response.ok) {
                    const data = await response.json();
                    
                    document.getElementById('totalFriends').innerText = data.total_friends || 0;
                    document.getElementById('pendingBonus').innerText = '$' + (data.pending_bonus || 0);
                    document.getElementById('earnedBonus').innerText = '$' + (data.earned_bonus || 0);

                    const listContainer = document.getElementById('referralsListContainer');
                    
                    if (data.referrals && data.referrals.length > 0) {
                        let html = '';
                        data.referrals.forEach(ref => {
                            html += `
                                <div class="referral-row">
                                    <div class="r-info">
                                        <h5>${ref.email}</h5>
                                        <span>Joined ${ref.date}</span>
                                    </div>
                                    <div class="status-tag ${ref.status}">
                                        ${ref.status === 'completed' ? '+$10' : 'Pending'}
                                    </div>
                                </div>
                            `;
                        });
                        listContainer.innerHTML = html;
                    } else {
                        showEmptyState();
                    }
                } else {
                    showEmptyState();
                }
            } catch (e) {
                console.error("Failed to load referrals", e);
                showEmptyState();
            }
        }

        function showEmptyState() {
            // Сбрасываем значения, если данных нет
            document.getElementById('totalFriends').innerText = '0';
            document.getElementById('pendingBonus').innerText = '$0';
            document.getElementById('earnedBonus').innerText = '$0';
            
            document.getElementById('referralsListContainer').innerHTML = `
                <div class="empty-state">
                    <i class="ri-group-line"></i>
                    <p>No friends invited yet</p>
                </div>
            `;
        }

        // Вызываем функцию загрузки при старте
        loadReferrals();
    </script>
</body>
</html>
