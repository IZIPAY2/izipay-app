<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Issue Card | IZIPAY</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --accent: #d4b56f;
            --text-secondary: #8e8e93;
            --btn-gray: #1c1c1e;
            --dark-block: #0d0d0d;
            --container-width: 1400px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: var(--container-width);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 4px 0 4px;
            margin-bottom: 20px;
        }

        .back-btn {
            background: var(--btn-gray);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            border: 1px solid #333;
        }

        .logo-text { font-size: 24px; font-weight: 800; color: var(--accent); letter-spacing: 1px; }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr 500px;
                gap: 40px;
                align-items: center;
                margin-top: 40px;
            }
            .app-container { padding: 40px; }
        }

        .intro-side h1 { font-size: 42px; font-weight: 800; margin-bottom: 20px; line-height: 1.1; }
        .intro-side p { color: var(--text-secondary); font-size: 16px; line-height: 1.6; max-width: 500px; }

        @media (max-width: 1023px) {
            .intro-side { text-align: center; margin-bottom: 10px; }
            .intro-side h1 { font-size: 32px; }
            .intro-side p { font-size: 15px; margin: 0 auto; }
        }

        .form-card {
            background: linear-gradient(145deg, #1e1e1e 0%, #0a0a0a 100%);
            border: 1px solid #2a2a2a;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .live-activity {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.1);
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 12px;
            color: #10b981;
            font-weight: 600;
        }

        .live-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; position: relative; }
        .live-dot::after { content: ''; position: absolute; width: 100%; height: 100%; background: inherit; border-radius: inherit; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        .card-option {
            position: relative;
            cursor: pointer;
        }

        .card-option input { position: absolute; opacity: 0; }

        .option-content {
            background: var(--dark-block);
            border: 1px solid #1c1c1e;
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: 0.3s;
        }

        .card-option input:checked + .option-content {
            border-color: var(--accent);
            background: rgba(212, 181, 111, 0.05);
            box-shadow: 0 0 20px rgba(212, 181, 111, 0.1);
        }

        .popular-badge {
            position: absolute;
            top: -10px; right: 20px;
            background: var(--accent);
            color: black;
            font-size: 10px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 100px;
            text-transform: uppercase;
            z-index: 2;
        }

        .option-icon {
            width: 48px; height: 48px;
            background: var(--btn-gray);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: var(--accent);
        }

        .option-info { flex: 1; }
        .option-title { display: block; font-size: 16px; font-weight: 700; margin-bottom: 2px; }
        .option-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }
        .option-price { font-size: 16px; font-weight: 800; color: white; }

        .btn-submit {
            background: var(--accent);
            color: black;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.7; pointer-events: none; }

        .trust-badges {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 5px;
            opacity: 0.4;
            filter: grayscale(1);
        }
        .trust-badges i { font-size: 24px; }

        .user-footer { text-align: center; color: var(--text-secondary); font-size: 11px; margin-top: 10px; }

        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid black;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="top-nav">
            <a href="index.html" class="back-btn">
                <i class="ri-arrow-left-s-line"></i>
            </a>
            <div class="logo-text">IZIPAY</div>
            <div style="width: 42px;"></div>
        </header>

        <div class="main-layout">
            <div class="intro-side">
                <h1>Issue New<br>Crypto Card</h1>
                <p>Bridge your digital assets to the real world. Secure, private, and accepted at over 40 million merchants globally.</p>
            </div>

            <div class="form-side">
                <form id="issueForm" class="form-card">
                    <div class="live-activity">
                        <span class="live-dot"></span>
                        <span>Last <strong id="lastCardType">Virtual Card</strong> issued <span id="lastTime">4</span> min ago</span>
                    </div>

                    <label class="card-option" onclick="updateButtonText('regular')">
                        <span class="popular-badge">Best Value</span>
                        <input type="radio" name="card_type" value="regular" checked>
                        <div class="option-content">
                            <div class="option-icon"><i class="ri-bank-card-line"></i></div>
                            <div class="option-info">
                                <span class="option-title">Virtual Card</span>
                                <span class="option-desc">No KYC Required • Instant Apple Pay • $0 Monthly Fees</span>
                            </div>
                            <div class="option-price">$49.99</div>
                        </div>
                    </label>

                    <label class="card-option" onclick="updateButtonText('physical')">
                        <input type="radio" name="card_type" value="physical">
                        <div class="option-content">
                            <div class="option-icon"><i class="ri-vip-crown-line"></i></div>
                            <div class="option-info">
                                <span class="option-title">Physical Metal Card</span>
                                <span class="option-desc">18g Premium Metal • Global ATM Access • Free Tracking</span>
                            </div>
                            <div class="option-price">$449.99</div>
                        </div>
                    </label>

                    <button type="submit" class="btn-submit" id="submitBtn">
                        <span id="btnText">Activate Virtual Card</span>
                    </button>

                    <div class="trust-badges">
                        <i class="ri-visa-line"></i>
                        <i class="ri-mastercard-line"></i>
                        <i class="ri-apple-fill"></i>
                        <i class="ri-google-fill"></i>
                    </div>

                    <div class="user-footer" id="session-info">
                        Encryption secured session active
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Если есть username, покажем его в футере безопасности
        if (tg.initDataUnsafe?.user?.username) {
            document.getElementById('session-info').innerText = 'Encryption secured session for: @' + tg.initDataUnsafe.user.username;
        }

        // Обновление текста кнопки с Haptic Feedback
        function updateButtonText(type) {
            const btnText = document.getElementById('btnText');
            if (type === 'regular') {
                btnText.innerText = 'Activate Virtual Card';
            } else {
                btnText.innerText = 'Order Physical Card';
            }
            tg.HapticFeedback.selectionChanged();
        }

        // Отправка формы (логика Telegram бота)
        document.getElementById('issueForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const cardType = document.querySelector('input[name="card_type"]:checked').value;
            
            // Включаем анимацию загрузки
            btn.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div>';
            tg.HapticFeedback.impactOccurred('medium');

            try {
                // Запрос к API
                const response = await fetch('https://izipay.me/api/issue_card.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tg_id: tg.initDataUnsafe?.user?.id || "7897252945",
                        card_type: cardType
                    })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // Редирект на страницу оплаты
                    window.location.href = result.redirect;
                } else {
                    tg.showAlert(result.message);
                    btn.disabled = false;
                    updateButtonText(cardType);
                }
            } catch (error) {
                tg.showAlert("Connection error to izipay.me");
                btn.disabled = false;
                updateButtonText(cardType);
            }
        });

        // Логика умного таймера (социальное доказательство)
        document.addEventListener('DOMContentLoaded', function() {
            const cardTypes = ['Virtual Card', 'Physical Metal Card'];
            
            let lastType = localStorage.getItem('last_card_type') || cardTypes[Math.floor(Math.random() * cardTypes.length)];
            let lastTime = parseInt(localStorage.getItem('last_card_time')) || Math.floor(Math.random() * 10) + 2;
            
            // Немного увеличиваем время, если пользователь зашел снова
            if(localStorage.getItem('last_card_time')) {
                lastTime += Math.floor(Math.random() * 3);
            }

            localStorage.setItem('last_card_type', lastType);
            localStorage.setItem('last_card_time', lastTime);

            document.getElementById('lastCardType').innerText = lastType;
            document.getElementById('lastTime').innerText = lastTime;
        });
    </script>
</body>
</html>
