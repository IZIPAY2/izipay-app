<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transactions | IZIPAY</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --accent: #d4b56f;
            --text-secondary: #8e8e93;
            --btn-gray: #1c1c1e;
            --dark-block: #0d0d0d;
            --container-width: 1400px;
            --app-max-width: 430px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; /* Фиксируем экран для Transactions */
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        .app-container {
            width: 100%;
            max-width: var(--container-width);
            height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        /* ШАПКА */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 4px 0 4px;
            margin-bottom: 20px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .icon-circle-btn {
            background: var(--btn-gray);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .icon-circle-btn:active {
            transform: scale(0.95);
        }

        /* ЦЕНТРАЛЬНЫЙ БЛОК (ИДЕАЛЬНО ПО ЦЕНТРУ) */
        .empty-state-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-bottom: 60px; /* Компенсация шапки */
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--btn-gray);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            color: var(--accent);
            opacity: 0.9;
        }

        .empty-state-wrapper h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .empty-state-wrapper p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            max-width: 260px;
            margin-bottom: 24px;
        }

        .action-btn {
            background: var(--accent);
            color: black;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            transition: transform 0.2s;
            display: inline-block;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        /* ДЕСКТОПНАЯ АДАПТАЦИЯ ДЛЯ ПУСТОГО СОСТОЯНИЯ */
        @media (min-width: 1024px) {
            .app-container { padding: 40px; }
            .page-title { font-size: 40px; }
            .empty-icon { width: 120px; height: 120px; border-radius: 40px; }
            .empty-icon svg { width: 50px; height: 50px; }
            .empty-state-wrapper h3 { font-size: 28px; }
            .empty-state-wrapper p { font-size: 18px; max-width: 400px; }
            .action-btn { padding: 16px 32px; font-size: 18px; border-radius: 20px; }
        }

        /* ТАБ БАР */
        .nav-bar {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            max-width: calc(100% - 32px);
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 8px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 10px;
            text-decoration: none;
            padding: 8px 0;
            border-radius: 30px;
            transition: all 0.2s ease;
            overflow: visible;
        }

        .nav-item svg {
            flex-shrink: 0;
            margin-bottom: 2px;
            display: block;
            overflow: visible;
        }

        .nav-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        @media (max-width: 1023px) {
            .app-container {
                padding-bottom: 120px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="top-nav">
            <h1 class="page-title">Transactions</h1>
            <a href="profile.html" class="icon-circle-btn">
                <i class="ri-user-3-line" style="font-size: 20px;"></i>
            </a>
        </header>

        <main class="empty-state-wrapper">
            <div class="empty-icon">
                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v4"/><path d="M12 18v4"/><path d="m4.93 4.93 2.83 2.83"/><path d="m16.24 16.24 2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="m4.93 19.07 2.83-2.83"/><path d="m16.24 7.76 2.83-2.83"/>
                </svg>
            </div>
            <h3>No transactions yet</h3>
            <p>Your activity history will appear here once you start using your card.</p>
            <a href="issue_card.html" class="action-btn" onclick="triggerHaptic()">Issue your first card</a>
        </main>

        <nav class="nav-bar">
            <a href="index.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
                <span>Cards</span>
            </a>
            <a href="transactions.html" class="nav-item active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V8H6a2 2 0 01-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><rect x="14" y="11" width="8" height="6" rx="2"/></svg>
                <span>Transactions</span>
            </a>
            <a href="settings.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span>Settings</span>
            </a>
        </nav>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function triggerHaptic() {
            tg.HapticFeedback.impactOccurred('medium');
        }

        // В будущем здесь можно добавить fetch запрос к API для проверки, 
        // появились ли транзакции, и динамически отрисовать список.
    </script>
</body>
</html>
